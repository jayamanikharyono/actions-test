name: Test Airflow DAG Action (Airflow 2)
on: [push, pull_request]

permissions:
  security-events: write
  contents: read

jobs:
  validate:
    name: Validate DAGs (Airflow 2)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: .pip-cache
          key: pip-af2-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-af2-

      - name: Validate DAGs
        id: validate
        uses: jayamanikharyono/airflow-dag-action@master
        with:
          requirementsFile: requirements.txt
          dagPaths: dags
          pluginPaths: plugins
          loadExamples: "True"
          varFile: var.json
          connFile: conns.json
          accessToken: ${{ secrets.GITHUB_TOKEN }}
          airflowVersion: "2.10.4"
          pythonVersion: "3.11"
          airflowExtras: "async,postgres,cncf.kubernetes"
          additionalPips: "numpy pandas"
          validationRules: "all"
          customTests: custom_checks.py
          enableSarif: "true"

      - name: Upload SARIF
        if: always() && steps.validate.outputs.sarif-file != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: validation_results.sarif
          category: airflow2-dag-validation

  validate-negative:
    name: Negative tests (Airflow 2)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Negative DAGs
        uses: jayamanikharyono/airflow-dag-action@master
        with:
          dagPaths: dags_negative
          accessToken: ${{ secrets.GITHUB_TOKEN }}
          airflowVersion: "2.10.4"
          pythonVersion: "3.11"
          airflowExtras: "async"
          validationRules: "all"
          maxTaskCount: "2"
          failOnError: "false"
